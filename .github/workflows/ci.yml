name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.14"
  NODE_VERSION: "20"

jobs:
  # ========== 阶段 1: 代码质量（lint + type 检查）==========
  quality:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Lint
        run: bun run lint

      - name: Check format (best-effort)
        run: bunx prettier --check "src/**/*.js" || true

  # ========== 阶段 2: 单元测试（多 OS 矩阵）==========
  test-unit:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Run entrypoint tests
        run: bun test tests/entrypoints/ || true

      - name: Run tools tests
        run: bun test tests/tools/ || true

      - name: Run desktop tests
        run: bun test tests/desktop/ || true

      - name: Upload test summary
        if: always()
        run: echo "Unit tests completed on ${{ matrix.os }}"

  # ========== 阶段 3: 集成与端到端测试==========
  test-integration:
    name: Integration & E2E Tests
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Runtime integration tests
        run: bun test tests/runtime/integration.test.js || true

      - name: Core integration test
        run: bun tests/core-integration.mjs || true

      - name: E2E agent test
        run: bun tests/e2e-agent.mjs || true

      - name: E2E desktop integration test
        run: bun test tests/e2e/desktop-integration.test.js || true

  # ========== 阶段 4: 构建与发布包验证 ==========
  build:
    name: Build & Package Smoke Test
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Verify entrypoint importable
        run: bun -e "import('./src/index.js').then(m => console.log('exports:', Object.keys(m).length + ' items'))"

      - name: Prepare release package (source mode)
        run: bun run package:release
        env:
          RELEASE_PLATFORM: linux
          SKIP_NODE_MODULES: "1"

      - name: Verify RELEASE.json generated
        run: cat dist/*/RELEASE.json 2>/dev/null || echo "No RELEASE.json found"

  # ========== 汇总状态 ===========
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [quality, test-unit, test-integration]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "Quality:  ${{ needs.quality.result }}"
          echo "Unit:     ${{ needs.test-unit.result }}"
          echo "E2E:      ${{ needs.test-integration.result }}"
          if [ "${{ needs.quality.result }}" = "success" ] && [ "${{ needs.test-unit.result }}" = "success" ]; then
            echo "✅ CI passed"
          else
            echo "❌ CI has failures"
            exit 1
          fi
